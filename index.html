/* ═══════════════════ SHARED STATE (useReducer) ═══════════════════ */
const AppCtx = createContext(null);
function reducer(state, action) {
  switch(action.type) {
    case "ADD_LEAD": {
      const newLead = {...action.payload, id: Date.now(), date: new Date().toISOString().slice(0,10), status:"New", wins:0, activity:[]};
      const p = state.partners.find(p=>p.id===action.payload.partnerId);
      const pts = p ? TIER_CONFIG[p.tier].leadBonus : 50;
      return {
        ...state,
        leads: [newLead, ...state.leads],
        partners: state.partners.map(p=>p.id===action.payload.partnerId ? {...p, leads:p.leads+1, points:p.points+50} : p),
        activityLog: [{id:Date.now(),type:"lead",text:`New lead: "${action.payload.company}"`,partner:action.payload.partnerId,date:new Date().toISOString().slice(0,10),icon:"📋"},...state.activityLog],
      };
    }
    case "UPDATE_LEAD_STATUS": {
      const lead = state.leads.find(l=>l.id===action.id);
      const isWon = action.status==="Closed Won";
      const partner = state.partners.find(p=>p.id===lead.partnerId);
      const bonus = isWon && partner ? TIER_CONFIG[partner.tier].leadBonus : 0;
      return {
        ...state,
        leads: state.leads.map(l=>l.id===action.id ? {...l, status:action.status, activity:[...l.activity, {date:new Date().toISOString().slice(0,10), text:`Status changed to "${action.status}"`}]} : l),
        partners: state.partners.map(p=>p.id===lead.partnerId ? {...p, wins: isWon ? p.wins+1 : p.wins, points: p.points+bonus, ytdKickback: isWon ? p.ytdKickback+(lead.value*(TIER_CONFIG[p.tier].kickback/100)) : p.ytdKickback} : p),
        activityLog: [{id:Date.now(),type:"lead",text:`Lead "${lead.company}" → ${action.status}`,partner:lead.partnerId,date:new Date().toISOString().slice(0,10),icon:isWon?"🎯":"📋"},...state.activityLog],
      };
    }
    case "ADD_LEAD_COMMENT": {
      return { ...state, leads: state.leads.map(l=>l.id===action.id ? {...l, activity:[...l.activity,{date:new Date().toISOString().slice(0,10),text:action.text}]} : l) };
    }
    case "ADD_CUSTOMER": {
      const p = state.partners.find(p=>p.id===action.partnerId);
      const kb = p ? Math.round(action.customer.arr * (TIER_CONFIG[p.tier].kickback/100)) : 0;
      const newC = {...action.customer, id:`ec_${Date.now()}`, status:"Pending", kickback:kb};
      const ptsBonus = 100;
      return {
        ...state,
        customers: {...state.customers, [action.partnerId]: [...(state.customers[action.partnerId]||[]), newC]},
        partners: state.partners.map(p=>p.id===action.partnerId ? {...p, points:p.points+ptsBonus} : p),
        activityLog: [{id:Date.now(),type:"customer",text:`New customer added: "${action.customer.name}"`,partner:action.partnerId,date:new Date().toISOString().slice(0,10),icon:"👥"},...state.activityLog],
      };
    }
    case "UPDATE_CUSTOMER_STATUS": {
      return { ...state, customers: {...state.customers, [action.partnerId]: state.customers[action.partnerId].map(c=>c.id===action.id ? {...c, status:action.status} : c)} };
    }
    case "COMPLETE_COURSE": {
      const course = COURSES.find(c=>c.id===action.courseId);
      const p = state.partners.find(p=>p.id===action.partnerId);
      if (!p || p.courses.includes(action.courseId)) return state;
      const certBonus = course.cert ? TIER_CONFIG[p.tier].certBonus : 0;
      const newPoints = p.points + course.pts + certBonus;
      const newCourses = [...p.courses, action.courseId];
      // Check tier upgrade
      let newTier = p.tier;
      if (newPoints >= TIER_CONFIG.Gold.pointsMin) newTier = "Gold";
      else if (newPoints >= TIER_CONFIG.Silver.pointsMin) newTier = "Silver";
      const upgraded = newTier !== p.tier;
      return {
        ...state,
        partners: state.partners.map(p=>p.id===action.partnerId ? {...p, courses:newCourses, points:newPoints, tier:newTier, certified: p.certified || (course.cert)} : p),
        activityLog: [
          ...(upgraded ? [{id:Date.now()+1,type:"tier",text:`Upgraded to ${newTier} tier!`,partner:action.partnerId,date:new Date().toISOString().slice(0,10),icon:"🥇"}] : []),
          {id:Date.now(),type:"course",text:`Completed: "${course.title}"`,partner:action.partnerId,date:new Date().toISOString().slice(0,10),icon:"🎓"},
          ...state.activityLog
        ],
      };
    }
    case "UPDATE_CASE_STATUS": {
      return { ...state, cases: state.cases.map(c=>c.id===action.id ? {...c, status:action.status} : c) };
    }
    case "ADD_CASE": {
      const newCase = {...action.payload, id:Date.now(), num:`C-${String(400+state.cases.length+1).padStart(5,"0")}`, status:"Open", comments:[]};
      return { ...state, cases: [newCase,...state.cases] };
    }
    case "ADD_CASE_COMMENT": {
      return { ...state, cases: state.cases.map(c=>c.id===action.id ? {...c, comments:[...c.comments,{author:action.author,date:new Date().toISOString().slice(0,10),text:action.text}]} : c) };
    }
    case "SET_PARTNER_GOAL": {
      return { ...state, goals: { ...state.goals, [action.partnerId]: { ...(state.goals?.[action.partnerId]||{}), [action.key]: action.value } } };
    }
    default: return state;
  }
}

const Bar=({val,max,thin,gold})=>{
  const pct=Math.min(100,Math.round((val/max)*100));
  const col=gold?C.gold:pct>=80?C.green:pct>=50?"#38BCA7":pct>=25?C.gold:C.red;
  return <div style={{background:C.cardBorder,borderRadius:99,height:thin?5:8,overflow:"hidden",flex:1}}><div style={{width:`${pct}%`,height:"100%",borderRadius:99,background:col,transition:"width .9s cubic-bezier(.4,0,.2,1)"}}/></div>;
};

/* Modal */
const Modal=({title,onClose,children,wide,subtitle})=>{
  useEffect(()=>{
    const h=e=>{if(e.key==="Escape")onClose();};
    window.addEventListener("keydown",h);
    return()=>window.removeEventListener("keydown",h);
  },[]);
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(22,33,58,.6)",zIndex:1000,display:"flex",alignItems:"flex-start",justifyContent:"center",padding:"32px 20px",backdropFilter:"blur(6px)"}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:C.white,borderRadius:12,width:"100%",maxWidth:wide?960:660,maxHeight:"85vh",overflow:"auto",boxShadow:"0 24px 64px rgba(22,33,58,.35)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 24px",borderBottom:`1px solid ${C.cardBorder}`,position:"sticky",top:0,background:C.white,zIndex:1}}>
          <div>
            <h2 style={{margin:0,fontSize:16,fontWeight:800,color:C.text,fontFamily:"'Sora',sans-serif"}}>{title}</h2>
            {subtitle&&<div style={{fontSize:12,color:C.textMid,marginTop:2,fontFamily:"'DM Sans',sans-serif"}}>{subtitle}</div>}
          </div>
          <button onClick={onClose} style={{background:C.pageGrey,border:"none",borderRadius:6,width:30,height:30,cursor:"pointer",fontSize:16,color:C.textMid,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
        </div>
        <div style={{padding:24}}>{children}</div>
      </div>
    </div>
  );
};

/* Toast notification */
const Toast=({msg,onDone})=>{
  useEffect(()=>{const t=setTimeout(onDone,2800);return()=>clearTimeout(t);},[]);
  return <div style={{position:"fixed",bottom:24,right:24,zIndex:2000,background:C.green,color:"#fff",borderRadius:10,padding:"12px 20px",boxShadow:"0 8px 24px rgba(0,131,91,.35)",fontSize:13,fontWeight:600,fontFamily:"'DM Sans',sans-serif",display:"flex",alignItems:"center",gap:10,animation:"fadeIn .2s ease"}}>
    <span>✓</span>{msg}
  </div>;
};

const TH=({ch,right})=><th style={{padding:"9px 12px",textAlign:right?"right":"left",fontSize:10,fontWeight:700,color:C.textLight,textTransform:"uppercase",letterSpacing:.7,fontFamily:"'DM Sans',sans-serif",background:C.pageGrey,borderBottom:`1px solid ${C.cardBorder}`,whiteSpace:"nowrap"}}>{ch}</th>;
const TD=({children,bold,mono,right,green,small})=><td style={{padding:"10px 12px",fontSize:small?11:13,textAlign:right?"right":"left",color:green?C.green:bold?C.text:C.textMid,fontFamily:mono?"'Courier New',monospace":"'DM Sans',sans-serif",borderBottom:`1px solid ${C.cardBorder}`,fontWeight:bold?600:400}}>{children}</td>;
const BtnP=({ch,onClick,small,full,danger,disabled})=><button disabled={disabled} onClick={onClick} onMouseEnter={e=>{if(!disabled)e.currentTarget.style.filter="brightness(1.1)";}} onMouseLeave={e=>{e.currentTarget.style.filter="none";}} style={{background:disabled?"#ccc":danger?C.red:C.green,color:"#fff",border:"none",borderRadius:6,padding:small?"6px 14px":"9px 20px",fontSize:small?12:13,fontWeight:700,cursor:disabled?"not-allowed":"pointer",fontFamily:"'DM Sans',sans-serif",whiteSpace:"nowrap",width:full?"100%":"auto",opacity:disabled?.6:1,transition:"filter .15s"}}>{ch}</button>;

const FLabel=({t})=><div style={{fontSize:11,fontWeight:700,color:C.textMid,textTransform:"uppercase",letterSpacing:.6,marginBottom:5,fontFamily:"'DM Sans',sans-serif"}}>{t}</div>;
const FInput=({v,onChange,ph,type})=><input type={type||"text"} value={v} onChange={onChange} placeholder={ph} style={{width:"100%",border:`1px solid ${C.cardBorder}`,borderRadius:6,padding:"8px 12px",fontSize:13,fontFamily:"'DM Sans',sans-serif",color:C.text,background:C.white,outline:"none",boxSizing:"border-box"}}/>;
const FSelect=({v,onChange,opts})=><select value={v} onChange={onChange} style={{width:"100%",border:`1px solid ${C.cardBorder}`,borderRadius:6,padding:"8px 12px",fontSize:13,fontFamily:"'DM Sans',sans-serif",color:C.text,background:C.white,cursor:"pointer"}}>{opts.map(o=><option key={o}>{o}</option>)}</select>;

const SectionDivider=({title,action})=><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,paddingBottom:10,borderBottom:`1px solid ${C.cardBorder}`}}><h3 style={{margin:0,fontSize:14,fontWeight:700,color:C.text,fontFamily:"'Sora',sans-serif"}}>{title}</h3>{action}</div>;

/* ═══════════════════ TIER PROGRESS WIDGET ═══════════════════ */
const TierProgress=({partner,onCompare})=>{
  const cfg=TIER_CONFIG[partner.tier];
  const next=NEXT_TIER[partner.tier];
  const nextCfg=next?TIER_CONFIG[next]:null;
  const pct=next?Math.min(100,Math.round(((partner.points-cfg.pointsMin)/(nextCfg.pointsMin-cfg.pointsMin))*100)):100;
  const ptsNeeded=next?nextCfg.pointsMin-partner.points:0;
  return (
    <div style={{background:`linear-gradient(135deg,${C.greenDeep} 0%,${C.green} 100%)`,borderRadius:10,padding:22,color:"#fff",position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",right:-8,top:-8,fontSize:100,opacity:.05,pointerEvents:"none"}}>✳</div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
        <div>
          <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:1,color:"rgba(255,255,255,.55)",fontFamily:"'DM Sans',sans-serif",marginBottom:3}}>Partner Points</div>
          <div style={{fontSize:44,fontWeight:900,fontFamily:"'Sora',sans-serif",lineHeight:1}}>{partner.points.toLocaleString()}</div>
        </div>
        <TierBadge tier={partner.tier} lg/>
      </div>
      <div style={{marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
          <span style={{fontSize:11,color:"rgba(255,255,255,.65)",fontFamily:"'DM Sans',sans-serif"}}>{next?`Progress to ${next}`:"🎉 Maximum tier"}</span>
          <span style={{fontSize:12,fontWeight:800,color:C.gold,fontFamily:"'Sora',sans-serif"}}>{pct}%</span>
        </div>
        <div style={{background:"rgba(255,255,255,.2)",borderRadius:99,height:9,overflow:"hidden"}}>
          <div style={{width:`${pct}%`,height:"100%",background:C.gold,borderRadius:99,transition:"width 1.2s ease",boxShadow:"0 0 8px rgba(232,162,0,.5)"}}/>
        </div>
        {next&&<div style={{display:"flex",justifyContent:"space-between",marginTop:5}}>
          <span style={{fontSize:10,color:"rgba(255,255,255,.4)",fontFamily:"'DM Sans',sans-serif"}}>{cfg.pointsMin.toLocaleString()} pts</span>
          <span style={{fontSize:10,color:C.gold,fontWeight:700,fontFamily:"'DM Sans',sans-serif"}}>{ptsNeeded.toLocaleString()} pts to {next} →</span>
        </div>}
      </div>
      <div style={{display:"flex",gap:5}}>
        {TIERS.map(t=>{
          const tc=TIER_CONFIG[t];
          const isCur=t===partner.tier;
          const isPast=tc.pointsMin<=partner.points&&!isCur;
          return <div key={t} style={{flex:1,borderRadius:6,padding:"7px 8px",background:isCur?"rgba(255,255,255,.18)":isPast?"rgba(255,255,255,.06)":"rgba(255,255,255,.02)",border:`1px solid ${isCur?"rgba(255,255,255,.35)":"rgba(255,255,255,.08)"}`,opacity:isPast||isCur?1:.45}}>
            <div style={{fontSize:10,fontWeight:700,color:"#fff",fontFamily:"'Sora',sans-serif"}}>{t==="Gold"?"🥇":t==="Silver"?"🥈":"🥉"} {t}</div>
            <div style={{fontSize:9,color:"rgba(255,255,255,.55)",fontFamily:"'DM Sans',sans-serif"}}>{tc.kickback}% kickback</div>
          </div>;
        })}
      </div>
      {onCompare&&<button onClick={onCompare} style={{marginTop:12,background:"rgba(255,255,255,.15)",color:"#fff",border:"1px solid rgba(255,255,255,.25)",borderRadius:6,padding:"6px 14px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",width:"100%"}}>Compare all tiers →</button>}
    </div>
  );
};

        {!isAdmin&&<button onClick={()=>setModal("tiercompare")} style={{background:"rgba(255,255,255,.15)",color:"#fff",border:"1px solid rgba(255,255,255,.3)",borderRadius:8,padding:"8px 16px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",flexShrink:0}}>Tier Roadmap →</button>}

      {/* Partner view: tier progress + commission */}

            <SectionDivider title="Commission Structure"/>

        <div style={{padding:"13px 18px",borderBottom:`1px solid ${C.cardBorder}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>

  return(<>
    <div style={{overflowX:"auto"}}>

                {submitter&&<TierBadge tier={submitter.tier}/>}

              <TD>{l.type}</TD>
              <td style={{padding:"10px 12px",textAlign:"right",borderBottom:`1px solid ${C.cardBorder}`,fontSize:13,fontWeight:600,color:C.text,fontFamily:"'Sora',sans-serif"}}>{l.value.toLocaleString()}</td>
              <td style={{padding:"10px 12px",textAlign:"right",borderBottom:`1px solid ${C.cardBorder}`,fontSize:13,fontWeight:700,color:C.green,fontFamily:"'Sora',sans-serif"}}>{Math.round(l.value*(submitterCfg.kickback/100)).toLocaleString()}</td>

            </tr>

  </>);
};

/* ═══════════════════ RECRUIT SECTION ═══════════════════ */
const RecruitSection=({partner,isAdmin})=>{
  const {state,dispatch}=useContext(AppCtx);
  const [open,setOpen]=useState(false);
  const [statusFilter,setStatusFilter]=useState(null);
  const [form,setForm]=useState({company:"",type:"New Client",size:"Medium",value:"",notes:""});
  const set=k=>e=>setForm(f=>({...f,[k]:e.target.value}));
  const myLeads=isAdmin?state.leads:state.leads.filter(l=>l.partnerId===partner.id);
  const filteredLeads=statusFilter?myLeads.filter(l=>l.status===statusFilter):myLeads;
  const cfg=TIER_CONFIG[partner.tier];
  const totalVal=myLeads.reduce((s,l)=>s+l.value,0);
  const wonVal=myLeads.filter(l=>l.status==="Closed Won").reduce((s,l)=>s+l.value,0);
  const exportLeads=()=>{
    const rows=[
      ["Company","Type","Status","Size","Value (NOK)","Date","Partner","Notes"],
      ...myLeads.map(l=>{
        const pName=state.partners.find(p=>p.id===l.partnerId)?.name||"";
        return[l.company,l.type,l.status,l.size,l.value,l.date,pName,l.notes||""];
      })
    ];
    const csv=rows.map(r=>r.map(v=>`"${v}"`).join(",")).join("\n");
    const blob=new Blob([csv],{type:"text/csv"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download="leads-export.csv";a.click();URL.revokeObjectURL(url);
  };
  const toggleFilter=s=>setStatusFilter(f=>f===s?null:s);
  return(
    <div>
      <div style={{display:"flex",gap:10,marginBottom:18,flexWrap:"wrap"}}>
        <Metric label="Total Leads" value={myLeads.length} icon="📋" onClick={()=>setStatusFilter(null)} active={!statusFilter}/>
        <Metric label="In Progress" value={myLeads.filter(l=>l.status==="In Progress").length} icon="🔵" onClick={()=>toggleFilter("In Progress")} active={statusFilter==="In Progress"}/>
        <Metric label="Qualified" value={myLeads.filter(l=>l.status==="Qualified").length} icon="✅" accent onClick={()=>toggleFilter("Qualified")} active={statusFilter==="Qualified"}/>
        <Metric label="Closed Won" value={myLeads.filter(l=>l.status==="Closed Won").length} sub={`+${cfg.leadBonus} NOK/win`} icon="🎯" accent onClick={()=>toggleFilter("Closed Won")} active={statusFilter==="Closed Won"}/>
        <Metric label="Pipeline Value" value={fmtNOK(totalVal)} sub={`Won: ${fmtNOK(wonVal)}`} icon="💰" accent/>
      </div>
      {!isAdmin&&(
        <div style={{background:C.greenLight,border:`1px solid ${C.greenMid}`,borderRadius:8,padding:"13px 18px",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontWeight:700,fontSize:13,color:C.text,fontFamily:"'DM Sans',sans-serif"}}>Submit a lead to Tripletex sales team</div>
            <div style={{fontSize:11,color:C.textMid,marginTop:2,fontFamily:"'DM Sans',sans-serif"}}>Refer a business · Refer an accounting office · +{cfg.leadBonus} NOK on close</div>
          </div>
          <BtnP ch={open?"Cancel":"+ New Lead"} onClick={()=>setOpen(o=>!o)} small/>
        </div>
      )}
      {open&&(
        <Card style={{marginBottom:14}}>
          <SectionDivider title="New Lead Submission"/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
            <div><FLabel t="Company Name"/><FInput v={form.company} onChange={set("company")} ph="Company..."/></div>
            <div><FLabel t="Lead Type"/><FSelect v={form.type} onChange={set("type")} opts={["New Client","Referral","Refer Accounting Office","Refer Business to Tripletex"]}/></div>
            <div><FLabel t="Size"/><FSelect v={form.size} onChange={set("size")} opts={["Small","Medium","Large"]}/></div>
            <div><FLabel t="Est. Value (NOK)"/><FInput v={form.value} onChange={set("value")} ph="e.g. 48000" type="number"/></div>
            <div style={{gridColumn:"2/-1"}}><FLabel t="Notes"/><FInput v={form.notes} onChange={set("notes")} ph="Context for the sales team..."/></div>
            <div style={{gridColumn:"1/-1"}}><BtnP ch={`Submit Lead (+50 pts · potential kickback: ${fmtNOK(Math.round((Number(form.value)||0)*(cfg.kickback/100)))})`} full onClick={()=>{if(!form.company)return;dispatch({type:"ADD_LEAD",payload:{company:form.company,partnerId:partner.id,type:form.type,size:form.size,value:Number(form.value)||20000,notes:form.notes}});setForm({company:"",type:"New Client",size:"Medium",value:"",notes:""});setOpen(false);}}/></div>
          </div>
        </Card>
      )}
      <Card noPad>
        <div style={{padding:"13px 18px",borderBottom:`1px solid ${C.cardBorder}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <h3 style={{margin:0,fontSize:13,fontWeight:700,color:C.text,fontFamily:"'Sora',sans-serif"}}>Lead Pipeline</h3>
            {statusFilter&&<span style={{fontSize:10,background:C.greenLight,color:C.greenDark,border:`1px solid ${C.green}40`,borderRadius:99,padding:"1px 8px",fontWeight:700,fontFamily:"'DM Sans',sans-serif",cursor:"pointer"}} onClick={()=>setStatusFilter(null)}>Filtered: {statusFilter} ✕</span>}
          </div>
          {isAdmin&&<BtnG ch="Export CSV" small onClick={exportLeads}/>}
        </div>
        <LeadTable leads={filteredLeads} partner={partner} isAdmin={isAdmin}/>
      </Card>
    </div>
  );
};

                  <td style={{padding:"10px 12px",borderBottom:`1px solid ${C.cardBorder}`}}><button onClick={()=>setSelCase(c)} style={{background:C.blueLight,color:C.blue,border:"none",borderRadius:6,padding:"4px 10px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>View</button></td>
                </tr>
              );
            })}</tbody>
          </table>
        </div>
      </Card>
      {selCase&&<CaseDetailModal cas={selCase} partnerName={state.partners.find(p=>p.id===selCase.partnerId)?.name||""} onClose={()=>setSelCase(null)} isAdmin={isAdmin}/>}
    </div>
  );
};

/* ═══════════════════ ACTIVITY FEED (admin sidebar) ═══════════════════ */

            <div style={{fontSize:12,color:C.text,fontFamily:"'DM Sans',sans-serif"}}>{a.text}</div>

);

/* ═══════════════════ NAV ═══════════════════ */
/* ═══════════════════ CHART WIDGET ═══════════════════ */
const ChartWidget=({type,data,options,height=200})=>{
  const ref=useRef(null);
  const inst=useRef(null);
  useEffect(()=>{
    if(!ref.current||!window.Chart)return;
    if(inst.current){inst.current.destroy();inst.current=null;}
    inst.current=new window.Chart(ref.current,{type,data,options});
    return()=>{if(inst.current){inst.current.destroy();inst.current=null;}};
  },[]);
  return <canvas ref={ref} height={height} style={{width:"100%"}}/>;
};

/* ═══════════════════ ANALYTICS SECTION ═══════════════════ */
const AnalyticsSection=({isAdmin,partner})=>{
  const {state}=useContext(AppCtx);
  const viewPartners=isAdmin?state.partners:[partner];
  const viewLeads=isAdmin?state.leads:state.leads.filter(l=>l.partnerId===partner.id);
  const viewCustomers=isAdmin?Object.values(state.customers).flat():state.customers[partner.id]||[];

  const totalARR=viewCustomers.reduce((s,c)=>s+c.arr,0);
  const totalYTD=viewPartners.reduce((s,p)=>s+p.ytdKickback,0);
  const wonLeads=viewLeads.filter(l=>l.status==="Closed Won").length;
  const convRate=viewLeads.length?Math.round((wonLeads/viewLeads.length)*100):0;

  const barLabels=isAdmin?viewPartners.map(p=>p.name.split(" ").slice(0,2).join(" ")):viewCustomers.slice(0,8).map(c=>c.name.split(" ")[0]);
  const barValues=isAdmin?viewPartners.map(p=>(state.customers[p.id]||[]).reduce((s,c)=>s+c.arr,0)):viewCustomers.slice(0,8).map(c=>c.arr);
  const barColors=isAdmin?viewPartners.map(p=>TIER_CONFIG[p.tier].color):viewCustomers.slice(0,8).map(()=>C.green);
  const barData={labels:barLabels,datasets:[{label:"ARR (NOK)",data:barValues,backgroundColor:barColors.map(c=>c+"99"),borderColor:barColors,borderWidth:1,borderRadius:6}]};
  const barOptions={indexAxis:"y",responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{callback:v=>v>=1e6?`${(v/1e6).toFixed(1)}M`:`${(v/1000).toFixed(0)}k`},grid:{color:"#E0E5EC"}},y:{grid:{display:false},ticks:{font:{family:"'DM Sans',sans-serif",size:11}}}}};

  const statuses=["New","In Progress","Qualified","Closed Won"];
  const statusColors=["#0070D2","#E07B00","#2E7D32","#00835B"];
  const doughnutData={labels:statuses,datasets:[{data:statuses.map(s=>viewLeads.filter(l=>l.status===s).length),backgroundColor:statusColors.map(c=>c+"BB"),borderColor:statusColors,borderWidth:2}]};
  const doughnutOptions={responsive:true,plugins:{legend:{position:"bottom",labels:{font:{family:"'DM Sans',sans-serif",size:11},padding:10}}},cutout:"60%"};

  const monthMap={};
  viewLeads.forEach(l=>{const m=l.date.slice(0,7);monthMap[m]=(monthMap[m]||0)+1;});
  const months=Object.keys(monthMap).sort();
  const monthLabels=months.map(m=>{const mo=parseInt(m.split("-")[1]);return["","Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][mo];});
  const lineData={labels:monthLabels,datasets:[{label:"Leads",data:months.map(m=>monthMap[m]),borderColor:C.green,backgroundColor:C.green+"22",fill:true,tension:0.4,pointBackgroundColor:C.green,pointRadius:5,pointHoverRadius:7}]};
  const lineOptions={responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1},grid:{color:"#E0E5EC"}},x:{grid:{display:false},ticks:{font:{family:"'DM Sans',sans-serif"}}}}};

  const tierCounts=TIERS.map(t=>viewPartners.filter(p=>p.tier===t).length);
  const tierData={labels:TIERS,datasets:[{data:tierCounts,backgroundColor:[TIER_CONFIG.Bronze.color+"BB",TIER_CONFIG.Silver.color+"BB",TIER_CONFIG.Gold.color+"BB"],borderColor:[TIER_CONFIG.Bronze.color,TIER_CONFIG.Silver.color,TIER_CONFIG.Gold.color],borderWidth:2}]};
  const tierOptions={responsive:true,plugins:{legend:{position:"bottom",labels:{font:{family:"'DM Sans',sans-serif",size:11},padding:10}}},cutout:"60%"};

  return(
    <div>
      <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
        <Metric label="Total ARR" value={fmtNOK(totalARR)} icon="💰" accent/>
        <Metric label="Total Leads" value={viewLeads.length} icon="📋"/>
        <Metric label="Closed Won" value={wonLeads} sub={`${convRate}% conversion`} icon="🎯" accent/>
        <Metric label="YTD Commission" value={fmtNOK(totalYTD)} icon="💸" accent/>
        {isAdmin&&<Metric label="Partners" value={viewPartners.length} icon="🤝"/>}
      </div>
      <div style={{display:"grid",gridTemplateColumns:isAdmin?"2fr 1fr":"3fr 1fr",gap:14,marginBottom:14}}>
        <Card>
          <SectionDivider title={isAdmin?"ARR per Partner (NOK)":"Client ARR Breakdown (NOK)"}/>
          <ChartWidget type="bar" data={barData} options={barOptions} height={isAdmin?200:160}/>
        </Card>
        <Card>
          <SectionDivider title="Lead Status"/>
          <ChartWidget type="doughnut" data={doughnutData} options={doughnutOptions} height={200}/>
        </Card>
      </div>
      <div style={{display:"grid",gridTemplateColumns:isAdmin?"2fr 1fr":"1fr",gap:14}}>
        <Card>
          <SectionDivider title="Lead Submissions Over Time"/>
          <ChartWidget type="line" data={lineData} options={lineOptions} height={140}/>
        </Card>
        {isAdmin&&(
          <Card>
            <SectionDivider title="Partner Tier Mix"/>
            <ChartWidget type="doughnut" data={tierData} options={tierOptions} height={200}/>
          </Card>
        )}
      </div>
    </div>
  );
};

const NAV=[
  {id:"plan",label:"Plan",icon:"🗓"},
  {id:"enable",label:"Enable",icon:"🎓"},
  {id:"recruit",label:"Recruit & Sell",icon:"🤝"},
  {id:"incentivize",label:"Incentivize",icon:"🏆"},
  {id:"support",label:"Support",icon:"🎧"},
  {id:"analytics",label:"Analytics",icon:"📊"},
];

/* ═══════════════════ ROOT APP ═══════════════════ */
function App(){
  const [state,dispatch]=useReducer(reducer,{partners:INIT_PARTNERS,customers:INIT_CUSTOMERS,leads:INIT_LEADS,cases:INIT_CASES,activityLog:ACTIVITY_LOG_INIT,goals:{}});
  const [role,setRole]=useState("partner");
  const [tab,setTab]=useState("plan");
  const [pIdx,setPIdx]=useState(0);
  const [toast,setToast]=useState(null);

  // Wrap dispatch with toast notifications
  const dispatchWithToast=(action)=>{
    const msgs={ADD_LEAD:`Lead submitted! +50 pts`,COMPLETE_COURSE:`Course completed!`,ADD_CUSTOMER:`Client added! +100 pts`,UPDATE_LEAD_STATUS:(a)=>a.status==="Closed Won"?`Deal closed! 🎉 Commission earned`:null,ADD_CASE:`Case submitted!`};
    const msg=typeof msgs[action.type]==="function"?msgs[action.type](action):msgs[action.type];
    if(msg)setToast(msg);
    dispatch(action);
  };

  const partner=state.partners[pIdx];

  useEffect(()=>{
    const l=document.createElement("link");
    l.rel="stylesheet";
    l.href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap";
    document.head.appendChild(l);
    document.body.style.margin="0";
    document.body.style.background=C.pageGrey;
  },[]);

  const next=NEXT_TIER[partner.tier];

  return(
    <AppCtx.Provider value={{state,dispatch:dispatchWithToast,toast,setToast}}>
      <div style={{minHeight:"100vh",background:C.pageGrey,fontFamily:"'DM Sans',sans-serif"}}>
        <style>{`@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}`}</style>

        {/* TOP NAV */}
        <div style={{background:C.navy,position:"sticky",top:0,zIndex:200}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 24px",height:52,borderBottom:`1px solid ${C.navyBorder}`}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:32,height:32,borderRadius:8,background:C.green,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,color:"#fff",fontWeight:900}}>✳</div>
              <div>
                <div style={{color:"#fff",fontWeight:800,fontSize:14,lineHeight:1,fontFamily:"'Sora',sans-serif"}}>tripletex</div>
                <div style={{color:C.green,fontWeight:600,fontSize:10,letterSpacing:.6,textTransform:"uppercase",fontFamily:"'DM Sans',sans-serif"}}>Partner Cloud</div>
              </div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{display:"flex",background:"rgba(255,255,255,.07)",borderRadius:6,padding:3,gap:2}}>
                {[{id:"partner",l:"Partner View"},{id:"admin",l:"Admin View"}].map(r=>(
                  <button key={r.id} onClick={()=>setRole(r.id)} style={{background:role===r.id?C.green:"transparent",color:role===r.id?"#fff":"rgba(255,255,255,.5)",border:"none",borderRadius:5,padding:"5px 14px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",transition:"all .15s"}}>{r.l}</button>
                ))}
              </div>
              {role==="partner"&&(
                <select value={pIdx} onChange={e=>setPIdx(Number(e.target.value))} style={{background:"rgba(255,255,255,.08)",color:"#fff",border:"1px solid rgba(255,255,255,.15)",borderRadius:6,padding:"6px 10px",fontSize:12,fontFamily:"'DM Sans',sans-serif",cursor:"pointer"}}>
                  {state.partners.map((p,i)=><option key={p.id} value={i} style={{background:C.navy}}>{p.name}</option>)}
                </select>
              )}
              <div style={{width:32,height:32,borderRadius:99,background:C.green,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:13,fontWeight:800,fontFamily:"'Sora',sans-serif"}}>{role==="admin"?"A":partner.name[0]}</div>
            </div>
          </div>
          {/* Tab nav */}
          <div style={{display:"flex",padding:"0 24px",gap:2,overflowX:"auto",scrollbarWidth:"none"}}>
            {NAV.map(n=>(
              <button key={n.id} onClick={()=>setTab(n.id)} style={{background:"transparent",border:"none",borderBottom:tab===n.id?`3px solid ${C.green}`:"3px solid transparent",color:tab===n.id?"#fff":"rgba(255,255,255,.5)",padding:"10px 16px",fontSize:13,fontWeight:tab===n.id?700:500,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",whiteSpace:"nowrap",transition:"color .15s,border-color .15s",display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontSize:14}}>{n.icon}</span>{n.label}
              </button>
            ))}
          </div>
        </div>

        {/* SUB-HEADER */}
        <div style={{background:C.white,borderBottom:`1px solid ${C.cardBorder}`,padding:"9px 28px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:11,color:C.textLight,fontFamily:"'DM Sans',sans-serif"}}>Partner Cloud</span>
            <span style={{color:C.textLight}}>›</span>
            <span style={{fontSize:11,fontWeight:600,color:C.textMid,fontFamily:"'DM Sans',sans-serif"}}>{NAV.find(n=>n.id===tab)?.label}</span>
            {role==="partner"&&<><span style={{color:C.textLight}}>›</span><span style={{fontSize:11,fontWeight:600,color:C.text,fontFamily:"'DM Sans',sans-serif"}}>{partner.name}</span></>}
          </div>
          {role==="partner"&&(
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <TierBadge tier={partner.tier}/>
              <span style={{fontSize:12,color:C.textMid,fontFamily:"'DM Sans',sans-serif"}}>⭐ <strong style={{color:C.gold}}>{partner.points.toLocaleString()}</strong> pts</span>
              {next&&<span style={{fontSize:11,color:C.textMid,background:C.pageGrey,borderRadius:99,padding:"2px 10px",fontFamily:"'DM Sans',sans-serif"}}>{(TIER_CONFIG[next].pointsMin-partner.points).toLocaleString()} pts to {next}</span>}
            </div>
          )}
          {role==="admin"&&<span style={{fontSize:11,color:C.textMid,fontFamily:"'DM Sans',sans-serif"}}>{state.partners.length} partners · Total YTD: {fmtNOK(state.partners.reduce((s,p)=>s+p.ytdKickback,0))}</span>}
        </div>

        {/* CONTENT */}
        <div style={{maxWidth:1280,margin:"0 auto",padding:"22px 28px"}}>
          {tab==="plan"        &&<PlanSection        partner={partner} isAdmin={role==="admin"}/>}
          {tab==="enable"      &&<EnableSection       partner={partner} isAdmin={role==="admin"}/>}
          {tab==="recruit"     &&<RecruitSection      partner={partner} isAdmin={role==="admin"}/>}
          {tab==="incentivize" &&<IncentivizeSection  partner={partner}/>}
          {tab==="support"     &&<SupportSection      partner={partner} isAdmin={role==="admin"}/>}
          {tab==="analytics"   &&<AnalyticsSection    partner={partner} isAdmin={role==="admin"}/>}
        </div>

        <div style={{textAlign:"center",padding:"18px",borderTop:`1px solid ${C.cardBorder}`,background:C.white}}>
          <span style={{fontSize:10,color:C.textLight,fontFamily:"'DM Sans',sans-serif"}}>Tripletex Partner Cloud · Salesforce Experience Cloud · Prototype v0.4</span>
        </div>

        {toast&&<Toast msg={toast} onDone={()=>setToast(null)}/>}
      </div>
    </AppCtx.Provider>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
